name: Sync main to master

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-main-to-master
  cancel-in-progress: true

jobs:
  sync:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check whether main is ahead of master
        id: ahead_check
        run: |
          git fetch origin main master

          if [ -n "$(git rev-list --max-count=1 origin/master..origin/main)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or reuse sync pull request
        id: pr
        if: steps.ahead_check.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_number="$(gh pr list --base master --head main --state open --json number --jq '.[0].number')"

          if [ -z "$pr_number" ]; then
            gh pr create \
              --base master \
              --head main \
              --title "chore: sync main to master" \
              --body "Automated PR to sync commits from \`main\` into \`master\`."

            pr_number="$(gh pr list --base master --head main --state open --json number --jq '.[0].number')"
          fi

          echo "number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Merge sync pull request
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge "${{ steps.pr.outputs.number }}" --merge --delete-branch=false
